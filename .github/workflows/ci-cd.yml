name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest httpx
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Lint with Ruff
        run: |
          # Run ruff for linting
          ruff check .
          # Run ruff for formatting check
          ruff format --check .

      - name: Run Tests
        run: |
          if [ -d tests ]; then
            PYTHONPATH=. pytest
          else
            echo "No tests directory found, skipping tests."
          fi

  deploy-production:
    name: Deploy to Production (Main)
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -avz --delete-excluded \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            -e "ssh -o StrictHostKeyChecking=no" \
            . ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/ramiro_rego/quiz-backend

      - name: Execute Remote Deploy Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ramiro_rego/quiz-backend
            chmod +x deploy.sh
            ./deploy.sh

      - name: Verify Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Checking production service status..."
            sudo systemctl status quiz-backend.service --no-pager || true

  deploy-staging:
    name: Deploy to Staging (Develop)
    needs: quality
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -avz --delete-excluded \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='venv/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            -e "ssh -o StrictHostKeyChecking=no" \
            . ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/ramiro_rego/quiz-backend-staging

      - name: Execute Remote Deploy Script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ramiro_rego/quiz-backend-staging
            chmod +x deploy_staging.sh
            ./deploy_staging.sh

      - name: Verify Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Checking staging service status..."
            sudo systemctl status quiz-backend-staging.service --no-pager || true

